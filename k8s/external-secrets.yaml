# ExternalSecret CRD — pulls secrets from an external provider (Vault, AWS SM, etc.)
# into a Kubernetes Secret that matches the existing carbonscope-secrets shape.
#
# Prerequisites:
#   1. Install the External Secrets Operator: https://external-secrets.io/latest/introduction/getting-started/
#   2. Create a SecretStore or ClusterSecretStore (see example below)
#   3. Populate the remote secret store with the required keys
#
# When this resource is applied, it replaces the static secrets.yaml
# and auto-rotates secrets on the configured refreshInterval.

---
# ClusterSecretStore pointing to HashiCorp Vault (example — adapt to your provider)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.internal:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "carbonscope"
          serviceAccountRef:
            name: carbonscope-backend
            namespace: carbonscope

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: carbonscope-secrets
  namespace: carbonscope
  labels:
    app: carbonscope
    component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: carbonscope-secrets # matches existing Secret name used by deployments
    creationPolicy: Owner
    deletionPolicy: Retain

  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: carbonscope/production
        property: secret_key

    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: carbonscope/production
        property: postgres_password

    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: carbonscope/production
        property: stripe_secret_key

    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: carbonscope/production
        property: stripe_webhook_secret

    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: carbonscope/production
        property: smtp_password

    - secretKey: SENTRY_DSN
      remoteRef:
        key: carbonscope/production
        property: sentry_dsn

    - secretKey: TOTP_ENCRYPTION_KEY
      remoteRef:
        key: carbonscope/production
        property: totp_encryption_key
