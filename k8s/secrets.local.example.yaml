apiVersion: v1
kind: Secret
metadata:
  name: carbonscope-secrets
  namespace: carbonscope
type: Opaque
stringData:
  # Required
  SECRET_KEY: "replace-with-64-char-random-secret"
  POSTGRES_PASSWORD: "replace-with-strong-postgres-password"
  TOTP_ENCRYPTION_KEY: "replace-with-32-char-totp-key"

  # Optional integrations
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  SMTP_PASSWORD: ""
  SENTRY_DSN: ""
